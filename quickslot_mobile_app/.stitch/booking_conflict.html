<div class="w-24 h-24 bg-surface-container-lowest rounded-full border border-error-container shadow-md flex items-center justify-center relative z-10">
<span class="material-symbols-outlined text-error text-[48px]" style="font-variation-settings: 'FILL' 0;">

</div>
<!-- Floating particles for visual interest -->
<div class="absolute top-0 right-0 w-3 h-3 bg-error rounded-full opacity-50 animate-ping" style="animation-duration: 3s;"></div>
<div class="absolute bottom-2 left-2 w-2 h-2 bg-error rounded-full opacity-30"></div>
</div>
